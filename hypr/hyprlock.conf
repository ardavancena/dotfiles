# ~/.config/hypr/hyprlock.conf

general {
  disable_loading_bar = true
  hide_cursor = true
  grace = 2
}

background {
  # Use a screenshot/blurred wallpaper-like lock background
  # If you want a static image instead, set path = /path/to/image
  color = rgba(0, 0, 0, 0.6)

  blur_passes = 3
  blur_size = 6
  noise = 0.02
  contrast = 0.9
  brightness = 0.8
  vibrancy = 0.15
  vibrancy_darkness = 0.2
}

input-field {
  size = 320, 55
  outline_thickness = 2
  dots_size = 0.25
  dots_spacing = 0.35
  dots_center = true
  fade_on_empty = true
  placeholder_text = "Password…"
  rounding = 10

  position = 0, -120
  halign = center
  valign = center

  font_color = rgb(220, 220, 220)
  inner_color = rgba(20, 20, 20, 0.6)
  outer_color = rgba(255, 255, 255, 0.15)
  check_color = rgba(0, 180, 120, 0.8)
  fail_color = rgba(220, 50, 60, 0.85)
}

label {
  text = "$TIME"
  font_size = 64

  position = 0, 120
  halign = center
  valign = center

  color = rgba(235, 235, 235, 0.95)
  shadow_passes = 2
  shadow_size = 3
}

