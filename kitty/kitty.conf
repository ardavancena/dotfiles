# Bright colors
color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# URL color
url_color #89b4fa

# Tab bar (optional)
 active_tab_background   #89b4fa
active_tab_foreground   #1e1e2e
inactive_tab_background #313244
inactive_tab_foreground #cdd6f4

