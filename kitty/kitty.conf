# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 17.0

# Window appearance
window_padding_width 10
background_opacity 0.0
confirm_os_window_close 0

# Cursor
cursor #f5e0dc
cursor_text_color #1e1e2e

# Selection
selection_foreground #1e1e2e
selection_background #f5e0dc

background #000000

# Normal colors
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
